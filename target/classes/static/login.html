<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>E-Shop | Login</title>
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>

<nav id="navbar"></nav>

<div class="auth-wrapper">
    <div class="auth-card">
        <h2>Welcome Back 👋</h2>
        <p class="subtitle">Login to your E-Shop account</p>

        <!-- Message box — shown on error or success -->
        <div id="message"></div>

        <!-- LOGIN FORM -->
        <div class="form-group">
            <label for="email">Email Address</label>
            <input type="email" id="email" placeholder="you@example.com" required />
        </div>

        <div class="form-group">
            <label for="password">Password</label>
            <input type="password" id="password" placeholder="Your password" required />
        </div>

        <button class="btn-block" onclick="handleLogin()">Login</button>

        <div class="auth-footer">
            Don't have an account? <a href="/register.html">Register here</a>
        </div>

        <!-- Demo credentials hint -->
        <div class="alert alert-info" style="margin-top:1rem; font-size:0.85rem;">
            <strong>Demo Admin:</strong> admin@shop.com / admin123
        </div>
    </div>
</div>

<script src="/js/config.js"></script>
<script>
    renderNavbar();

    // If already logged in, redirect to home
    if (getUser()) window.location.href = "/index.html";

    async function handleLogin() {
        const email    = document.getElementById("email").value.trim();
        const password = document.getElementById("password").value;
        const msgBox   = document.getElementById("message");

        // Basic validation
        if (!email || !password) {
            msgBox.innerHTML = '<div class="alert alert-error">Please fill in all fields.</div>';
            return;
        }

        try {
            // POST request to Spring Boot backend
            // fetch() is the modern JavaScript way to call APIs (replaces XMLHttpRequest)
            const response = await fetch(`${API_URL}/api/login`, {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ email, password })
            });

            const data = await response.json();

            if (response.ok) {
                // Save user to localStorage and redirect
                saveUser(data.user);
                msgBox.innerHTML = '<div class="alert alert-success">Login successful! Redirecting...</div>';
                setTimeout(() => window.location.href = "/index.html", 1000);
            } else {
                msgBox.innerHTML = `<div class="alert alert-error">${data.message}</div>`;
            }

        } catch (error) {
            msgBox.innerHTML = '<div class="alert alert-error">Cannot connect to server. Make sure the backend is running.</div>';
        }
    }

    // Allow pressing Enter to submit
    document.addEventListener("keydown", (e) => {
        if (e.key === "Enter") handleLogin();
    });
</script>

</body>
</html>
