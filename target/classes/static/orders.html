<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>E-Shop | My Orders</title>
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>

<nav id="navbar"></nav>

<div class="page">
    <h1 class="page-title">📦 My Orders</h1>
    <p class="page-subtitle">Track your order history</p>

    <div id="ordersContent">
        <div class="loading">Loading your orders...</div>
    </div>
</div>

<footer><p>© 2024 E-Shop</p></footer>

<script src="/js/config.js"></script>
<script>

    window.onload = async function () {
        renderNavbar();
        requireLogin();    // Redirect to login if not logged in
        await loadOrders();
    };

    async function loadOrders() {
        const user    = getUser();
        const content = document.getElementById("ordersContent");

        try {
            // GET /api/orders/user/{userId} — only this user's orders
            const response = await fetch(`${API_URL}/api/orders/user/${user.id}`);
            const orders   = await response.json();

            if (orders.length === 0) {
                content.innerHTML = `
                    <div class="empty-state">
                        <div class="icon">📦</div>
                        <h3>No orders yet</h3>
                        <p>Start shopping to see your orders here!</p>
                        <br>
                        <button class="btn-primary" onclick="window.location.href='/products.html'">
                            Browse Products
                        </button>
                    </div>`;
                return;
            }

            content.innerHTML = `
                <table class="orders-table">
                    <thead>
                        <tr>
                            <th>Order ID</th>
                            <th>Date</th>
                            <th>Total Amount</th>
                            <th>Status</th>
                        </tr>
                    </thead>
                    <tbody>
                        ${orders.map(order => `
                            <tr>
                                <td><strong>#ORD-${order.id}</strong></td>
                                <td>${formatDate(order.orderDate)}</td>
                                <td><strong style="color:#e94560;">₹${order.totalAmount.toFixed(2)}</strong></td>
                                <td><span class="status-badge ${getStatusClass(order.status)}">${order.status}</span></td>
                            </tr>
                        `).join("")}
                    </tbody>
                </table>`;

        } catch (error) {
            content.innerHTML = '<div class="alert alert-error">Could not load orders. Make sure the server is running.</div>';
        }
    }

    // Format ISO date string to readable format
    function formatDate(dateStr) {
        if (!dateStr) return "N/A";
        const d = new Date(dateStr);
        return d.toLocaleDateString("en-US", {
            year: "numeric", month: "short", day: "numeric",
            hour: "2-digit", minute: "2-digit"
        });
    }

    // Return CSS class based on status
    function getStatusClass(status) {
        const map = {
            "Pending":    "status-pending",
            "Processing": "status-processing",
            "Shipped":    "status-shipped",
            "Delivered":  "status-delivered"
        };
        return map[status] || "status-pending";
    }
</script>

</body>
</html>
