<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>E-Shop | Admin Panel</title>
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>

<nav id="navbar"></nav>

<div class="page">
    <h1 class="page-title">⚙️ Admin Panel</h1>
    <p class="page-subtitle">Manage products and orders</p>

    <!-- STATS CARDS -->
    <div class="stats-grid">
        <div class="stat-card">
            <div class="stat-icon">📦</div>
            <div class="stat-label">Total Products</div>
            <div class="stat-value" id="statProducts">—</div>
        </div>
        <div class="stat-card">
            <div class="stat-icon">🧾</div>
            <div class="stat-label">Total Orders</div>
            <div class="stat-value" id="statOrders">—</div>
        </div>
        <div class="stat-card">
            <div class="stat-icon">💰</div>
            <div class="stat-label">Total Revenue</div>
            <div class="stat-value" id="statRevenue">—</div>
        </div>
        <div class="stat-card">
            <div class="stat-icon">⏳</div>
            <div class="stat-label">Pending Orders</div>
            <div class="stat-value" id="statPending">—</div>
        </div>
    </div>

    <!-- TABS -->
    <div class="admin-tabs">
        <button class="tab-btn active" onclick="switchTab('products')">📦 Products</button>
        <button class="tab-btn"        onclick="switchTab('orders')">🧾 Orders</button>
    </div>

    <!-- PRODUCTS TAB -->
    <div id="tab-products" class="admin-section active">
        <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:1.2rem;">
            <h2 style="font-size:1.3rem; font-weight:700; color:#1a1a2e;">Product Catalog</h2>
            <button class="btn-primary" onclick="openModal()">+ Add Product</button>
        </div>

        <div id="productMessage"></div>

        <div id="productsTable"><div class="loading">Loading products...</div></div>
    </div>

    <!-- ORDERS TAB -->
    <div id="tab-orders" class="admin-section">
        <h2 style="font-size:1.3rem; font-weight:700; color:#1a1a2e; margin-bottom:1.2rem;">All Customer Orders</h2>

        <div id="orderMessage"></div>

        <div id="ordersTable"><div class="loading">Loading orders...</div></div>
    </div>
</div>

<!-- ==========================================
     ADD / EDIT PRODUCT MODAL
     ========================================== -->
<div class="modal-overlay" id="modalOverlay">
    <div class="modal">
        <h3 id="modalTitle">Add New Product</h3>

        <div id="modalMessage"></div>

        <input type="hidden" id="productId" />

        <div class="form-group">
            <label>Product Name</label>
            <input type="text" id="pName" placeholder="e.g. Wireless Headphones" />
        </div>
        <div class="form-group">
            <label>Description</label>
            <input type="text" id="pDesc" placeholder="Short product description" />
        </div>
        <div class="form-group">
            <label>Price (₹)</label>
            <input type="number" id="pPrice" placeholder="0.00" step="0.01" min="0" />
        </div>
        <div class="form-group">
            <label>Stock Quantity</label>
            <input type="number" id="pStock" placeholder="0" min="0" />
        </div>
        <div class="form-group">
            <label for="pCategory">Category</label>
            <select id="pCategory" aria-label="Product category">
                <option value="Electronics">Electronics</option>
                <option value="Clothing">Clothing</option>
                <option value="Sports">Sports</option>
                <option value="Kitchen">Kitchen</option>
                <option value="Other">Other</option>
            </select>
        </div>
        <div class="form-group">
            <label>Image URL (optional)</label>
            <input type="text" id="pImage" placeholder="https://..." />
        </div>

        <div class="modal-footer">
            <button class="btn-cancel" onclick="closeModal()">Cancel</button>
            <button class="btn-save"   onclick="saveProduct()">Save Product</button>
        </div>
    </div>
</div>

<footer><p>© 2024 E-Shop — Admin Panel</p></footer>

<script src="/js/config.js"></script>
<script>

    let allOrders   = [];
    let allProducts = [];

    // ==========================================
    // ON PAGE LOAD
    // ==========================================
    window.onload = async function () {
        renderNavbar();
        requireAdmin();  // Redirect if not admin
        await Promise.all([loadProducts(), loadOrders()]);
    };

    // ==========================================
    // TABS
    // ==========================================
    function switchTab(tab) {
        document.querySelectorAll(".admin-section").forEach(s => s.classList.remove("active"));
        document.querySelectorAll(".tab-btn").forEach(b => b.classList.remove("active"));
        document.getElementById(`tab-${tab}`).classList.add("active");
        event.target.classList.add("active");
    }

    // ==========================================
    // LOAD + RENDER PRODUCTS
    // ==========================================
    async function loadProducts() {
        try {
            const response  = await fetch(`${API_URL}/api/products`);
            allProducts     = await response.json();
            document.getElementById("statProducts").textContent = allProducts.length;
            renderProductsTable();
        } catch {
            document.getElementById("productsTable").innerHTML =
                '<div class="alert alert-error">Could not load products.</div>';
        }
    }

    function renderProductsTable() {
        const container = document.getElementById("productsTable");

        if (allProducts.length === 0) {
            container.innerHTML = '<div class="empty-state"><div class="icon">📦</div><h3>No products yet.</h3></div>';
            return;
        }

        container.innerHTML = `
            <table class="admin-table">
                <thead>
                    <tr>
                        <th>ID</th>
                        <th>Name</th>
                        <th>Category</th>
                        <th>Price</th>
                        <th>Stock</th>
                        <th>Actions</th>
                    </tr>
                </thead>
                <tbody>
                    ${allProducts.map(p => `
                        <tr>
                            <td>#${p.id}</td>
                            <td>
                                <strong>${p.name}</strong><br>
                                <span style="color:#999; font-size:0.8rem;">${p.description || ""}</span>
                            </td>
                            <td><span class="product-category">${p.category || "—"}</span></td>
                            <td><strong>₹${p.price.toFixed(2)}</strong></td>
                            <td style="color:${p.stock < 10 ? "#e94560" : "#333"}; font-weight:600;">
                                ${p.stock}
                            </td>
                            <td>
                                <button class="btn-edit"   onclick="editProduct(${p.id})">✏️ Edit</button>
                                <button class="btn-delete" onclick="deleteProduct(${p.id}, '${p.name}')">🗑️ Delete</button>
                            </td>
                        </tr>
                    `).join("")}
                </tbody>
            </table>`;
    }

    // ==========================================
    // LOAD + RENDER ORDERS
    // ==========================================
    async function loadOrders() {
        try {
            const response = await fetch(`${API_URL}/api/orders`);
            allOrders      = await response.json();

            // Update stats
            const revenue = allOrders.reduce((sum, o) => sum + o.totalAmount, 0);
            const pending = allOrders.filter(o => o.status === "Pending").length;
            document.getElementById("statOrders").textContent  = allOrders.length;
            document.getElementById("statRevenue").textContent = "₹" + revenue.toFixed(2);
            document.getElementById("statPending").textContent = pending;

            renderOrdersTable();
        } catch {
            document.getElementById("ordersTable").innerHTML =
                '<div class="alert alert-error">Could not load orders.</div>';
        }
    }

    function renderOrdersTable() {
        const container = document.getElementById("ordersTable");

        if (allOrders.length === 0) {
            container.innerHTML = '<div class="empty-state"><div class="icon">🧾</div><h3>No orders yet.</h3></div>';
            return;
        }

        container.innerHTML = `
            <table class="admin-table">
                <thead>
                    <tr>
                        <th>Order ID</th>
                        <th>Customer ID</th>
                        <th>Date</th>
                        <th>Total</th>
                        <th>Status</th>
                        <th>Update Status</th>
                    </tr>
                </thead>
                <tbody>
                    ${allOrders.map(order => `
                        <tr>
                            <td><strong>#ORD-${order.id}</strong></td>
                            <td>User #${order.userId}</td>
                            <td>${formatDate(order.orderDate)}</td>
                            <td><strong style="color:#e94560;">₹${order.totalAmount.toFixed(2)}</strong></td>
                            <td>
                                <span class="status-badge ${getStatusClass(order.status)}">
                                    ${order.status}
                                </span>
                            </td>
                            <td>
                                <select class="status-select" onchange="updateOrderStatus(${order.id}, this.value)">
                                    <option value="Pending"    ${order.status==="Pending"    ? "selected":""}>Pending</option>
                                    <option value="Processing" ${order.status==="Processing" ? "selected":""}>Processing</option>
                                    <option value="Shipped"    ${order.status==="Shipped"    ? "selected":""}>Shipped</option>
                                    <option value="Delivered"  ${order.status==="Delivered"  ? "selected":""}>Delivered</option>
                                </select>
                            </td>
                        </tr>
                    `).join("")}
                </tbody>
            </table>`;
    }

    // ==========================================
    // MODAL — OPEN FOR ADD
    // ==========================================
    function openModal() {
        document.getElementById("modalTitle").textContent = "Add New Product";
        document.getElementById("productId").value = "";
        document.getElementById("pName").value     = "";
        document.getElementById("pDesc").value     = "";
        document.getElementById("pPrice").value    = "";
        document.getElementById("pStock").value    = "";
        document.getElementById("pImage").value    = "";
        document.getElementById("pCategory").value = "Electronics";
        document.getElementById("modalMessage").innerHTML = "";
        document.getElementById("modalOverlay").classList.add("open");
    }

    // ==========================================
    // MODAL — OPEN FOR EDIT
    // ==========================================
    function editProduct(id) {
        const p = allProducts.find(p => p.id === id);
        if (!p) return;

        document.getElementById("modalTitle").textContent = "Edit Product";
        document.getElementById("productId").value = p.id;
        document.getElementById("pName").value     = p.name;
        document.getElementById("pDesc").value     = p.description || "";
        document.getElementById("pPrice").value    = p.price;
        document.getElementById("pStock").value    = p.stock;
        document.getElementById("pImage").value    = p.imageUrl || "";
        document.getElementById("pCategory").value = p.category || "Electronics";
        document.getElementById("modalMessage").innerHTML = "";
        document.getElementById("modalOverlay").classList.add("open");
    }

    function closeModal() {
        document.getElementById("modalOverlay").classList.remove("open");
    }

    // ==========================================
    // SAVE PRODUCT (Add or Edit)
    // ==========================================
    async function saveProduct() {
        const id    = document.getElementById("productId").value;
        const name  = document.getElementById("pName").value.trim();
        const price = parseFloat(document.getElementById("pPrice").value);
        const stock = parseInt(document.getElementById("pStock").value);
        const msgBox = document.getElementById("modalMessage");

        if (!name || isNaN(price) || isNaN(stock)) {
            msgBox.innerHTML = '<div class="alert alert-error">Name, price and stock are required.</div>';
            return;
        }

        const payload = {
            name:        name,
            description: document.getElementById("pDesc").value.trim(),
            price:       price,
            stock:       stock,
            category:    document.getElementById("pCategory").value,
            imageUrl:    document.getElementById("pImage").value.trim()
        };

        try {
            let response;

            if (id) {
                // EDIT — PUT /api/products/{id}
                response = await fetch(`${API_URL}/api/products/${id}`, {
                    method:  "PUT",
                    headers: { "Content-Type": "application/json" },
                    body:    JSON.stringify(payload)
                });
            } else {
                // ADD — POST /api/products
                response = await fetch(`${API_URL}/api/products`, {
                    method:  "POST",
                    headers: { "Content-Type": "application/json" },
                    body:    JSON.stringify(payload)
                });
            }

            const data = await response.json();

            if (response.ok) {
                closeModal();
                document.getElementById("productMessage").innerHTML =
                    `<div class="alert alert-success">${data.message}</div>`;
                await loadProducts();
                setTimeout(() => document.getElementById("productMessage").innerHTML = "", 3000);
            } else {
                msgBox.innerHTML = `<div class="alert alert-error">${data.message}</div>`;
            }

        } catch {
            msgBox.innerHTML = '<div class="alert alert-error">Could not connect to server.</div>';
        }
    }

    // ==========================================
    // DELETE PRODUCT
    // ==========================================
    async function deleteProduct(id, name) {
        if (!confirm(`Delete "${name}"? This cannot be undone.`)) return;

        try {
            const response = await fetch(`${API_URL}/api/products/${id}`, { method: "DELETE" });
            const data     = await response.json();

            document.getElementById("productMessage").innerHTML =
                response.ok
                    ? `<div class="alert alert-success">${data.message}</div>`
                    : `<div class="alert alert-error">${data.message}</div>`;

            if (response.ok) await loadProducts();
            setTimeout(() => document.getElementById("productMessage").innerHTML = "", 3000);

        } catch {
            document.getElementById("productMessage").innerHTML =
                '<div class="alert alert-error">Could not connect to server.</div>';
        }
    }

    // ==========================================
    // UPDATE ORDER STATUS
    // ==========================================
    async function updateOrderStatus(orderId, newStatus) {
        try {
            const response = await fetch(`${API_URL}/api/orders/${orderId}/status`, {
                method:  "PUT",
                headers: { "Content-Type": "application/json" },
                body:    JSON.stringify(newStatus)
            });

            const data = await response.json();

            document.getElementById("orderMessage").innerHTML =
                response.ok
                    ? `<div class="alert alert-success">${data.message}</div>`
                    : `<div class="alert alert-error">${data.message}</div>`;

            if (response.ok) await loadOrders();
            setTimeout(() => document.getElementById("orderMessage").innerHTML = "", 3000);

        } catch {
            document.getElementById("orderMessage").innerHTML =
                '<div class="alert alert-error">Could not connect to server.</div>';
        }
    }

    // ==========================================
    // HELPERS
    // ==========================================
    function formatDate(dateStr) {
        if (!dateStr) return "N/A";
        return new Date(dateStr).toLocaleDateString("en-US", {
            year: "numeric", month: "short", day: "numeric",
            hour: "2-digit", minute: "2-digit"
        });
    }

    function getStatusClass(status) {
        const map = { Pending:"status-pending", Processing:"status-processing", Shipped:"status-shipped", Delivered:"status-delivered" };
        return map[status] || "status-pending";
    }

    // Close modal if clicking the dark background
    document.getElementById("modalOverlay").addEventListener("click", function(e) {
        if (e.target === this) closeModal();
    });
</script>

</body>
</html>
