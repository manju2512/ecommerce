# =============================================
# SERVER CONFIGURATION
# =============================================
# INTERVIEW: Spring Boot starts an embedded Tomcat on this port.
# You access the app at http://localhost:8080
server.port=8080

# =============================================
# DATABASE CONFIGURATION
# =============================================
# INTERVIEW: "The datasource URL tells Spring Boot WHERE the database is,
#             WHAT database to connect to, and any connection options."
#
# useSSL=false         → don't use SSL for local development
# serverTimezone=UTC   → avoids timezone mismatch errors
# allowPublicKeyRetrieval=true → required for newer MySQL versions
spring.datasource.url=jdbc:mysql://localhost:3306/ecommerce_db?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true

# Change these to match your MySQL username and password
spring.datasource.username=root
spring.datasource.password=manju2512

# The JDBC driver class for MySQL
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# =============================================
# SCHEMA INITIALIZATION
# =============================================
# INTERVIEW: "spring.sql.init.mode=always tells Spring Boot to run schema.sql
#             every time the app starts. It creates tables if they don't exist."
spring.sql.init.mode=always
spring.sql.init.schema-locations=classpath:schema.sql

# =============================================
# LOGGING (optional, helps during development)
# =============================================
# Shows the SQL queries being run — useful for debugging
logging.level.org.springframework.jdbc=DEBUG